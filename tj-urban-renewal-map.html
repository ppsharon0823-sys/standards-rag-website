<style>
:root {
    --bg: #0a0f1a;
    --bg-card: rgba(13,19,33,0.7);
    --text: #e8ecf1;
    --text-secondary: #8b9bb4;
    --accent: #00d4ff;
    --border: rgba(0,212,255,0.12);
    --font: 'Inter','Noto Sans SC',-apple-system,sans-serif;
    --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body {
    display:flex;
    height:100vh;
    font-family:var(--font);
    background:var(--bg);
    overflow:hidden;
    color:var(--text);
    position:relative;
}
body::before {
    content:'';
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse at center, black 30%, transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 70%);
}

/* 左侧面板 */
.sidebar {
    width:380px;
    padding:16px;
    background:var(--bg-card);
    border-right:1px solid var(--border);
    backdrop-filter:blur(12px);
    display:flex;
    flex-direction:column;
    gap:12px;
    overflow-y:auto;
    position:relative;
    z-index:1;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sidebar::-webkit-scrollbar-thumb:hover{background:var(--accent)}

.header {
    padding:10px 14px;
    background:linear-gradient(135deg, rgba(0,212,255,0.2) 0%, rgba(0,212,255,0.05) 100%);
    color:var(--accent);
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 12px rgba(0,212,255,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    letter-spacing:1px;
    border:1px solid var(--border);
    font-weight:700;
    font-size:16px;
}

.back-link {
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--text-secondary);
    font-size:12px;
    text-decoration:none;
    padding:6px 10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:rgba(13,19,33,0.5);
    transition:all 0.3s;
    width:fit-content;
}
.back-link:hover {
    color:var(--accent);
    border-color:var(--accent);
    box-shadow:0 0 8px rgba(0,212,255,0.1);
}

.filter-bar {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}
.filter-btn {
    padding:5px 12px;
    border:1px solid var(--border);
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    cursor:pointer;
    font-size:12px;
    color:var(--text-secondary);
    transition:all 0.3s;
}
.filter-btn:hover, .filter-btn.active {
    background:rgba(0,212,255,0.15);
    color:var(--accent);
    border-color:var(--accent);
    box-shadow:0 0 8px rgba(0,212,255,0.1);
}

.project-list {
    display:flex;
    flex-direction:column;
    gap:6px;
}

/* 类别分组 */
.category-group {
    border-radius:10px;
    border:1px solid var(--border);
    overflow:hidden;
    background:rgba(13,19,33,0.3);
}
.category-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    cursor:pointer;
    background:rgba(13,19,33,0.5);
    transition:all 0.3s;
    user-select:none;
}
.category-header:hover {
    background:rgba(0,212,255,0.08);
}
.category-header.active {
    background:rgba(0,212,255,0.1);
    border-bottom:1px solid var(--border);
}
.category-title {
    font-size:13px;
    font-weight:600;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:6px;
}
.category-count {
    font-size:11px;
    color:var(--text-muted);
    font-weight:400;
}
.category-arrow {
    font-size:11px;
    color:var(--text-muted);
    transition:transform 0.3s;
}
.category-arrow.expanded {
    transform:rotate(90deg);
    color:var(--accent);
}
.category-content {
    display:none;
    padding:8px;
    flex-direction:column;
    gap:6px;
}
.category-content.expanded {
    display:flex;
}

.project-card {
    padding:10px 12px;
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    border:1px solid var(--border);
    cursor:pointer;
    transition:all 0.3s;
}
.project-card:hover {
    border-color:var(--accent);
    box-shadow:0 0 12px rgba(0,212,255,0.08);
}
.project-card.active {
    border-color:var(--accent);
    background:rgba(0,212,255,0.1);
}
.project-name {
    font-size:13px;
    font-weight:600;
    color:var(--text);
    margin-bottom:3px;
}
.project-meta {
    font-size:11px;
    color:var(--text-secondary);
    line-height:1.5;
}
.project-tag {
    display:inline-block;
    padding:2px 8px;
    border-radius:4px;
    font-size:10px;
    margin-top:4px;
    margin-right:4px;
}
.tag-urban {background:rgba(0,212,255,0.15);color:var(--accent)}
.tag-renewal {background:rgba(82,196,26,0.15);color:#52c41a}
.tag-industry {background:rgba(250,140,22,0.15);color:#fa8c16}
.tag-residential {background:rgba(235,47,150,0.15);color:#eb2f96}

.stats-bar {
    display:flex;
    gap:10px;
    padding:10px;
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    border:1px solid var(--border);
}
.stat-item {
    flex:1;
    text-align:center;
}
.stat-num {
    font-size:20px;
    font-weight:bold;
    color:var(--accent);
}
.stat-label {
    font-size:10px;
    color:var(--text-secondary);
    margin-top:2px;
}

#map {
    flex:1;
    position:relative;
    z-index:1;
}

/* 信息窗口 */
.info-window {
    padding:8px;
    min-width:220px;
}
.info-title {
    font-size:14px;
    font-weight:bold;
    color:#333;
    margin-bottom:6px;
    border-bottom:1px solid #eee;
    padding-bottom:4px;
}
.info-row {
    font-size:12px;
    color:#666;
    line-height:1.8;
}
.info-row span {
    color:#999;
}
</style>

let map;
let markers = [];
let currentFilter = 'all';

function initMap() {
    map = new AMap.Map('map', {
        zoom: 11,
        center: [117.20, 39.13],
        mapStyle: 'amap://styles/dark'
    });

    renderProjects();
    updateStats();
}

function renderProjects() {
    const listEl = document.getElementById('projectList');
    listEl.innerHTML = '';

    const filtered = currentFilter === 'all'
        ? projects
        : projects.filter(p => p.type === currentFilter);

    // 按类别分组
    const grouped = {};
    filtered.forEach(proj => {
        if (!grouped[proj.type]) grouped[proj.type] = [];
        grouped[proj.type].push(proj);
    });

    // 类别顺序
    const typeOrder = ['老旧居住','产业焕新','商圈焕新','历史文化','生态空间','科创学圈','其他'];
    const sortedTypes = typeOrder.filter(t => grouped[t]);

    sortedTypes.forEach((type, idx) => {
        const projList = grouped[type];
        const group = document.createElement('div');
        group.className = 'category-group';

        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
            <div class="category-title">
                ${type}
                <span class="category-count">（${projList.length}个）</span>
            </div>
            <span class="category-arrow ${idx === 0 ? 'expanded' : ''}">▶</span>
        `;

        const content = document.createElement('div');
        content.className = 'category-content' + (idx === 0 ? ' expanded' : '');
        if (idx === 0) header.classList.add('active');

        projList.forEach(proj => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.dataset.id = proj.id;
            card.innerHTML = `
                <div class="project-name">${proj.name}</div>
                <div class="project-meta">📍 ${proj.district} · ${proj.scale}</div>
                <span class="project-tag ${proj.tagClass}">${proj.type}</span>
            `;
            card.onclick = () => focusProject(proj);
            content.appendChild(card);
        });

        header.onclick = () => {
            const isExpanded = content.classList.contains('expanded');
            content.classList.toggle('expanded');
            header.querySelector('.category-arrow').classList.toggle('expanded', !isExpanded);
            header.classList.toggle('active', !isExpanded);
        };

        group.appendChild(header);
        group.appendChild(content);
        listEl.appendChild(group);
    });

    renderMarkers(filtered);
}

function renderMarkers(projectList) {
    // 清除旧标记
    markers.forEach(m => map.remove(m));
    markers = [];

    projectList.forEach(proj => {
        const marker = new AMap.Marker({
            position: [proj.lng, proj.lat],
            title: proj.name,
            label: {
                content: proj.name,
                direction: 'top',
                offset: new AMap.Pixel(0, -5)
            }
        });

        const infoContent = `
            <div class="info-window">
                <div class="info-title">${proj.name}</div>
                <div class="info-row"><span>类型：</span>${proj.type}</div>
                <div class="info-row"><span>区域：</span>${proj.district}</div>
                <div class="info-row"><span>规模：</span>${proj.scale}</div>
                <div class="info-row"><span>状态：</span>${proj.status}</div>
                <div class="info-row"><span>描述：</span>${proj.desc}</div>
            </div>
        `;

        const infoWindow = new AMap.InfoWindow({
            content: infoContent,
            offset: new AMap.Pixel(0, -30)
        });

        marker.on('click', () => {
            infoWindow.open(map, marker.getPosition());
            highlightCard(proj.id);
        });

        marker.setMap(map);
        markers.push(marker);
    });
}

function focusProject(proj) {
    map.setZoomAndCenter(14, [proj.lng, proj.lat]);
    highlightCard(proj.id);

    // 打开信息窗
    const marker = markers.find(m => {
        const pos = m.getPosition();
        return Math.abs(pos.lng - proj.lng) < 0.0001 && Math.abs(pos.lat - proj.lat) < 0.0001;
    });
    if (marker) marker.emit('click');
}

function highlightCard(id) {
    document.querySelectorAll('.project-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`.project-card[data-id="${id}"]`);
    if (card) {
        card.classList.add('active');
        // 确保父级类别已展开
        const content = card.closest('.category-content');
        if (content && !content.classList.contains('expanded')) {
            content.classList.add('expanded');
            const header = content.previousElementSibling;
            if (header) {
                header.classList.add('active');
                const arrow = header.querySelector('.category-arrow');
                if (arrow) arrow.classList.add('expanded');
            }
        }
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function filterProjects(type) {
    currentFilter = type;

    // 更新按钮状态
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === type);
    });

    renderProjects();
}

function updateStats() {
    document.getElementById('statTotal').textContent = projects.length;
    const types = new Set(projects.map(p => p.type));
    document.getElementById('statTypes').textContent = types.size;
    const areas = new Set(projects.map(p => p.district));
    document.getElementById('statAreas').textContent = areas.size;
}

window.onload = initMap;
</script>
</body>
</html>
