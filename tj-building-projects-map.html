<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>建筑分院项目地图 - TUPDI</title>
<script src="https://webapi.amap.com/maps?v=2.0&key=b0dd6ddde6f0130c89dea8f8b20f93fa"></script>
<style>
:root {
    --bg: #0a0f1a;
    --bg-card: rgba(13,19,33,0.7);
    --text: #e8ecf1;
    --text-secondary: #8b9bb4;
    --accent: #00d4ff;
    --border: rgba(0,212,255,0.12);
    --font: 'Inter','Noto Sans SC',-apple-system,sans-serif;
    --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body {
    display:flex;
    height:100vh;
    font-family:var(--font);
    background:var(--bg);
    overflow:hidden;
    color:var(--text);
    position:relative;
}
body::before {
    content:'';
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse at center, black 30%, transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 70%);
}

/* 左侧面板 */
.sidebar {
    width:380px;
    padding:16px;
    background:var(--bg-card);
    border-right:1px solid var(--border);
    backdrop-filter:blur(12px);
    display:flex;
    flex-direction:column;
    gap:12px;
    overflow-y:auto;
    position:relative;
    z-index:1;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sidebar::-webkit-scrollbar-thumb:hover{background:var(--accent)}

.header {
    padding:10px 14px;
    background:linear-gradient(135deg, rgba(0,212,255,0.2) 0%, rgba(0,212,255,0.05) 100%);
    color:var(--accent);
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 12px rgba(0,212,255,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    letter-spacing:1px;
    border:1px solid var(--border);
    font-weight:700;
    font-size:16px;
}

.back-link {
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--text-secondary);
    font-size:12px;
    text-decoration:none;
    padding:6px 10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:rgba(13,19,33,0.5);
    transition:all 0.3s;
    width:fit-content;
}
.back-link:hover {
    color:var(--accent);
    border-color:var(--accent);
    box-shadow:0 0 8px rgba(0,212,255,0.1);
}

.filter-bar {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}
.filter-btn {
    padding:5px 12px;
    border:1px solid var(--border);
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    cursor:pointer;
    font-size:12px;
    color:var(--text-secondary);
    transition:all 0.3s;
}
.filter-btn:hover, .filter-btn.active {
    background:rgba(0,212,255,0.15);
    color:var(--accent);
    border-color:var(--accent);
    box-shadow:0 0 8px rgba(0,212,255,0.1);
}

.project-list {
    display:flex;
    flex-direction:column;
    gap:6px;
}

/* 类别分组 */
.category-group {
    border-radius:10px;
    border:1px solid var(--border);
    overflow:hidden;
    background:rgba(13,19,33,0.3);
}
.category-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    cursor:pointer;
    background:rgba(13,19,33,0.5);
    transition:all 0.3s;
    user-select:none;
}
.category-header:hover {
    background:rgba(0,212,255,0.08);
}
.category-header.active {
    background:rgba(0,212,255,0.1);
    border-bottom:1px solid var(--border);
}
.category-title {
    font-size:13px;
    font-weight:600;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:6px;
}
.category-count {
    font-size:11px;
    color:var(--text-muted);
    font-weight:400;
}
.category-arrow {
    font-size:11px;
    color:var(--text-muted);
    transition:transform 0.3s;
}
.category-arrow.expanded {
    transform:rotate(90deg);
    color:var(--accent);
}
.category-content {
    display:none;
    padding:8px;
    flex-direction:column;
    gap:6px;
}
.category-content.expanded {
    display:flex;
}

.project-card {
    padding:10px 12px;
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    border:1px solid var(--border);
    cursor:pointer;
    transition:all 0.3s;
}
.project-card:hover {
    border-color:var(--accent);
    box-shadow:0 0 12px rgba(0,212,255,0.08);
}
.project-card.active {
    border-color:var(--accent);
    background:rgba(0,212,255,0.1);
}
.project-name {
    font-size:13px;
    font-weight:600;
    color:var(--text);
    margin-bottom:3px;
}
.project-meta {
    font-size:11px;
    color:var(--text-secondary);
    line-height:1.5;
}
.award-row {
    margin-top:6px;
    display:flex;
    flex-wrap:wrap;
    gap:4px;
}
.award-tag {
    display:inline-block;
    padding:2px 8px;
    border-radius:4px;
    font-size:10px;
}
.award-gold {background:rgba(255,215,0,0.15);color:#ffd700}
.award-silver {background:rgba(192,192,192,0.15);color:#c0c0c0}
.award-bronze {background:rgba(205,127,50,0.15);color:#cd7f32}
.project-tag {
    display:inline-block;
    padding:2px 8px;
    border-radius:4px;
    font-size:10px;
    margin-top:6px;
    margin-right:4px;
}
.tag-public {background:rgba(0,212,255,0.15);color:var(--accent)}
.tag-residential {background:rgba(82,196,26,0.15);color:#52c41a}
.tag-commercial {background:rgba(250,140,22,0.15);color:#fa8c16}
.tag-cultural {background:rgba(235,47,150,0.15);color:#eb2f96}
.tag-medical {background:rgba(255,68,68,0.15);color:#ff4444}

.stats-bar {
    display:flex;
    gap:10px;
    padding:10px;
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    border:1px solid var(--border);
}
.stat-item {
    flex:1;
    text-align:center;
}
.stat-num {
    font-size:20px;
    font-weight:bold;
    color:var(--accent);
}
.stat-label {
    font-size:10px;
    color:var(--text-secondary);
    margin-top:2px;
}

#map {
    flex:1;
    position:relative;
    z-index:1;
}

/* 信息窗口 */
.info-window {
    padding:8px;
    min-width:240px;
}
.info-title {
    font-size:14px;
    font-weight:bold;
    color:#333;
    margin-bottom:6px;
    border-bottom:1px solid #eee;
    padding-bottom:4px;
}
.info-row {
    font-size:12px;
    color:#666;
    line-height:1.8;
}
.info-row span {
    color:#999;
}
.info-awards {
    margin-top:6px;
    padding-top:6px;
    border-top:1px solid #eee;
}
</style>
</head>
<body>
<div class="sidebar">
    <div class="header">🏗️ 建筑分院项目地图</div>
    <a href="index.html" class="back-link">← 返回工具箱主页</a>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-label">项目总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="statAwards">0</div>
            <div class="stat-label">获奖项目</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="statTypes">0</div>
            <div class="stat-label">类型种类</div>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="filterProjects('all')">全部</button>
        <button class="filter-btn" data-filter="公共建筑" onclick="filterProjects('公共建筑')">公共建筑</button>
        <button class="filter-btn" data-filter="住宅" onclick="filterProjects('住宅')">住宅</button>
        <button class="filter-btn" data-filter="城市更新" onclick="filterProjects('城市更新')">城市更新</button>
        <button class="filter-btn" data-filter="医疗" onclick="filterProjects('医疗')">医疗</button>
        <button class="filter-btn" data-filter="商业" onclick="filterProjects('商业')">商业</button>
    </div>

    <div class="project-list" id="projectList"></div>
</div>
<div id="map"></div>

<script>
// 建筑分院项目数据
const projects = [
    {
        id: 1,
        name: '雄安新区青年安居项目',
        type: '住宅',
        district: '雄安新区',
        address: '河北雄安新区',
        lng: 115.93,
        lat: 39.03,
        status: '已建成',
        scale: '大型安居社区',
        desc: '京津冀协同发展最佳作品（2025），保障房设计典范',
        tagClass: 'tag-residential',
        awards: ['🏆 京津冀协同发展最佳作品 2025']
    },
    {
        id: 2,
        name: '人民医院项目',
        type: '医疗',
        district: '天津市',
        address: '天津市中心城区',
        lng: 117.20,
        lat: 39.10,
        status: '已建成',
        scale: '三甲医院',
        desc: '全国BIM创新杯三等奖（2025）',
        tagClass: 'tag-medical',
        awards: ['🥉 全国BIM创新杯三等奖 2025']
    },
    {
        id: 3,
        name: '经纬恒润研发中心',
        type: '公共建筑',
        district: '天津市',
        address: '天津市',
        lng: 117.25,
        lat: 39.15,
        status: '已建成',
        scale: '企业研发中心',
        desc: '海河杯一等成果（2025），工业建筑设计标杆',
        tagClass: 'tag-public',
        awards: ['🏆 海河杯一等成果 2025']
    },
    {
        id: 4,
        name: '保障性住房项目',
        type: '住宅',
        district: '天津市',
        address: '天津市',
        lng: 117.18,
        lat: 39.12,
        status: '已建成',
        scale: '保障性住宅社区',
        desc: '天津市"好房子"设计大赛一等奖（2024）',
        tagClass: 'tag-residential',
        awards: ['🏆 天津市好房子设计大赛一等奖 2024']
    },
    {
        id: 5,
        name: '容西片区安置房',
        type: '住宅',
        district: '雄安新区',
        address: '雄安新区容西片区',
        lng: 115.90,
        lat: 39.05,
        status: '已建成',
        scale: '大型安置社区',
        desc: '勘察设计一等成果（2024），雄安新区重点民生工程',
        tagClass: 'tag-residential',
        awards: ['🏆 勘察设计一等成果 2024']
    },
    {
        id: 6,
        name: '交通旅馆改造',
        type: '城市更新',
        district: '和平区',
        address: '天津市和平区',
        lng: 117.205,
        lat: 39.115,
        status: '已完成',
        scale: '历史建筑改造',
        desc: '勘察设计二等成果（2024），历史建筑活化利用',
        tagClass: 'tag-cultural',
        awards: ['🥈 勘察设计二等成果 2024']
    },
    {
        id: 7,
        name: '解放南路地区城市设计',
        type: '城市更新',
        district: '河西区',
        address: '天津市河西区解放南路',
        lng: 117.23,
        lat: 39.09,
        status: '已实施',
        scale: '大型片区',
        desc: '解放南路沿线街区整体城市设计，TUPDI重点项目',
        tagClass: 'tag-cultural',
        awards: []
    },
    {
        id: 8,
        name: '泰安道历史文化街区',
        type: '城市更新',
        district: '和平区',
        address: '天津市和平区泰安道',
        lng: 117.20,
        lat: 39.11,
        status: '已完成',
        scale: '历史街区',
        desc: '历史文化街区保护与更新，天津城市名片',
        tagClass: 'tag-cultural',
        awards: []
    },
    {
        id: 9,
        name: '天津城市中心设计',
        type: '公共建筑',
        district: '和平区',
        address: '天津市和平区',
        lng: 117.195,
        lat: 39.125,
        status: '已实施',
        scale: '城市核心区',
        desc: '天津城市中心地区城市设计，提升城市形象',
        tagClass: 'tag-public',
        awards: []
    }
];

let map;
let markers = [];
let currentFilter = 'all';

function initMap() {
    map = new AMap.Map('map', {
        zoom: 11,
        center: [117.20, 39.13],
        mapStyle: 'amap://styles/dark'
    });

    renderProjects();
    updateStats();
}

function renderProjects() {
    const listEl = document.getElementById('projectList');
    listEl.innerHTML = '';

    const filtered = currentFilter === 'all'
        ? projects
        : projects.filter(p => p.type === currentFilter);

    // 按类别分组
    const grouped = {};
    filtered.forEach(proj => {
        if (!grouped[proj.type]) grouped[proj.type] = [];
        grouped[proj.type].push(proj);
    });

    // 类别顺序
    const typeOrder = ['公共建筑','住宅','城市更新','医疗','商业'];
    const sortedTypes = typeOrder.filter(t => grouped[t]);

    sortedTypes.forEach((type, idx) => {
        const projList = grouped[type];
        const group = document.createElement('div');
        group.className = 'category-group';

        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
            <div class="category-title">
                ${type}
                <span class="category-count">（${projList.length}个）</span>
            </div>
            <span class="category-arrow ${idx === 0 ? 'expanded' : ''}">▶</span>
        `;

        const content = document.createElement('div');
        content.className = 'category-content' + (idx === 0 ? ' expanded' : '');
        if (idx === 0) header.classList.add('active');

        projList.forEach(proj => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.dataset.id = proj.id;

            let awardsHtml = '';
            if (proj.awards && proj.awards.length > 0) {
                const awardClass = proj.awards[0].includes('一等') || proj.awards[0].includes('最佳') || proj.awards[0].includes('一等奖')
                    ? 'award-gold'
                    : proj.awards[0].includes('二等') || proj.awards[0].includes('二等奖')
                    ? 'award-silver'
                    : 'award-bronze';
                awardsHtml = `<div class="award-row">${proj.awards.map(a => `<span class="award-tag ${awardClass}">${a}</span>`).join('')}</div>`;
            }

            card.innerHTML = `
                <div class="project-name">${proj.name}</div>
                <div class="project-meta">📍 ${proj.district} · ${proj.scale}</div>
                <span class="project-tag ${proj.tagClass}">${proj.type}</span>
                ${awardsHtml}
            `;
            card.onclick = () => focusProject(proj);
            content.appendChild(card);
        });

        header.onclick = () => {
            const isExpanded = content.classList.contains('expanded');
            content.classList.toggle('expanded');
            header.querySelector('.category-arrow').classList.toggle('expanded', !isExpanded);
            header.classList.toggle('active', !isExpanded);
        };

        group.appendChild(header);
        group.appendChild(content);
        listEl.appendChild(group);
    });

    renderMarkers(filtered);
}

function renderMarkers(projectList) {
    markers.forEach(m => map.remove(m));
    markers = [];

    projectList.forEach(proj => {
        const marker = new AMap.Marker({
            position: [proj.lng, proj.lat],
            title: proj.name,
            label: {
                content: proj.name,
                direction: 'top',
                offset: new AMap.Pixel(0, -5)
            }
        });

        let awardsHtml = '';
        if (proj.awards && proj.awards.length > 0) {
            awardsHtml = `<div class="info-awards"><strong>获奖：</strong>${proj.awards.join('<br>')}</div>`;
        }

        const infoContent = `
            <div class="info-window">
                <div class="info-title">${proj.name}</div>
                <div class="info-row"><span>类型：</span>${proj.type}</div>
                <div class="info-row"><span>区域：</span>${proj.district}</div>
                <div class="info-row"><span>规模：</span>${proj.scale}</div>
                <div class="info-row"><span>状态：</span>${proj.status}</div>
                <div class="info-row"><span>描述：</span>${proj.desc}</div>
                ${awardsHtml}
            </div>
        `;

        const infoWindow = new AMap.InfoWindow({
            content: infoContent,
            offset: new AMap.Pixel(0, -30)
        });

        marker.on('click', () => {
            infoWindow.open(map, marker.getPosition());
            highlightCard(proj.id);
        });

        marker.setMap(map);
        markers.push(marker);
    });
}

function focusProject(proj) {
    map.setZoomAndCenter(14, [proj.lng, proj.lat]);
    highlightCard(proj.id);

    const marker = markers.find(m => {
        const pos = m.getPosition();
        return Math.abs(pos.lng - proj.lng) < 0.0001 && Math.abs(pos.lat - proj.lat) < 0.0001;
    });
    if (marker) marker.emit('click');
}

function highlightCard(id) {
    document.querySelectorAll('.project-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`.project-card[data-id="${id}"]`);
    if (card) {
        card.classList.add('active');
        // 确保父级类别已展开
        const content = card.closest('.category-content');
        if (content && !content.classList.contains('expanded')) {
            content.classList.add('expanded');
            const header = content.previousElementSibling;
            if (header) {
                header.classList.add('active');
                const arrow = header.querySelector('.category-arrow');
                if (arrow) arrow.classList.add('expanded');
            }
        }
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function filterProjects(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === type);
    });
    renderProjects();
}

function updateStats() {
    document.getElementById('statTotal').textContent = projects.length;
    const awardCount = projects.filter(p => p.awards && p.awards.length > 0).length;
    document.getElementById('statAwards').textContent = awardCount;
    const types = new Set(projects.map(p => p.type));
    document.getElementById('statTypes').textContent = types.size;
}

window.onload = initMap;
</script>
</body>
</html>
