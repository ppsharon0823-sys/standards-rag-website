<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>天津规划总院·建筑设计产品中心 - 宣传展示</title>
<script src="https://webapi.amap.com/maps?v=2.0&key=b0dd6ddde6f0130c89dea8f8b20f93fa"></script>
<style>
:root {
    --bg: #0a0f1a;
    --bg-card: rgba(13,19,33,0.7);
    --text: #e8ecf1;
    --text-secondary: #8b9bb4;
    --text-muted: #5a6a85;
    --accent: #00d4ff;
    --border: rgba(0,212,255,0.12);
    --font: 'Inter','Noto Sans SC',-apple-system,sans-serif;
    --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body {
    display:flex;
    height:100vh;
    font-family:var(--font);
    background:var(--bg);
    overflow:hidden;
    color:var(--text);
    position:relative;
}
body::before {
    content:'';
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse at center, black 30%, transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 70%);
}

/* 顶部导航 */
.top-nav {
    position:fixed;
    top:0;left:0;right:0;
    height:56px;
    background:var(--bg-card);
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(12px);
    z-index:100;
    display:flex;
    align-items:center;
    padding:0 20px;
    gap:16px;
}
.nav-brand {
    font-size:15px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:1px;
    margin-right:auto;
    white-space:nowrap;
}
.nav-tabs {
    display:flex;
    gap:4px;
}
.nav-tab {
    padding:8px 18px;
    border:1px solid var(--border);
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    cursor:pointer;
    font-size:13px;
    color:var(--text-secondary);
    transition:all 0.3s;
}
.nav-tab:hover, .nav-tab.active {
    background:rgba(0,212,255,0.15);
    color:var(--accent);
    border-color:var(--accent);
    box-shadow:0 0 8px rgba(0,212,255,0.1);
}
.back-link {
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--text-secondary);
    font-size:12px;
    text-decoration:none;
    padding:6px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:rgba(13,19,33,0.5);
    transition:all 0.3s;
}
.back-link:hover {
    color:var(--accent);
    border-color:var(--accent);
}

/* 主内容区 */
.main-content {
    flex:1;
    margin-top:56px;
    display:flex;
    position:relative;
    z-index:1;
    overflow:hidden;
}
.page {
    display:none;
    width:100%;
    height:100%;
}
.page.active {
    display:flex;
}

/* 左侧面板 */
.sidebar {
    width:400px;
    padding:16px;
    background:var(--bg-card);
    border-right:1px solid var(--border);
    backdrop-filter:blur(12px);
    display:flex;
    flex-direction:column;
    gap:12px;
    overflow-y:auto;
    position:relative;
    z-index:1;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sidebar::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* 通用内容面板 */
.content-panel {
    flex:1;
    padding:24px 32px;
    overflow-y:auto;
    background:var(--bg);
}
.content-panel::-webkit-scrollbar{width:6px}
.content-panel::-webkit-scrollbar-track{background:transparent}
.content-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.header {
    padding:10px 14px;
    background:linear-gradient(135deg, rgba(0,212,255,0.2) 0%, rgba(0,212,255,0.05) 100%);
    color:var(--accent);
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 12px rgba(0,212,255,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    letter-spacing:1px;
    border:1px solid var(--border);
    font-weight:700;
    font-size:16px;
}

.stats-bar {
    display:flex;
    gap:10px;
    padding:10px;
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    border:1px solid var(--border);
}
.stat-item {
    flex:1;
    text-align:center;
}
.stat-num {
    font-size:20px;
    font-weight:bold;
    color:var(--accent);
}
.stat-label {
    font-size:10px;
    color:var(--text-secondary);
    margin-top:2px;
}

.filter-bar {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}
.filter-btn {
    padding:5px 12px;
    border:1px solid var(--border);
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    cursor:pointer;
    font-size:12px;
    color:var(--text-secondary);
    transition:all 0.3s;
}
.filter-btn:hover, .filter-btn.active {
    background:rgba(0,212,255,0.15);
    color:var(--accent);
    border-color:var(--accent);
    box-shadow:0 0 8px rgba(0,212,255,0.1);
}

.project-list {
    display:flex;
    flex-direction:column;
    gap:6px;
}

.category-group {
    border-radius:10px;
    border:1px solid var(--border);
    overflow:hidden;
    background:rgba(13,19,33,0.3);
}
.category-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    cursor:pointer;
    background:rgba(13,19,33,0.5);
    transition:all 0.3s;
    user-select:none;
}
.category-header:hover {
    background:rgba(0,212,255,0.08);
}
.category-header.active {
    background:rgba(0,212,255,0.1);
    border-bottom:1px solid var(--border);
}
.category-title {
    font-size:13px;
    font-weight:600;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:6px;
}
.category-count {
    font-size:11px;
    color:var(--text-muted);
    font-weight:400;
}
.category-arrow {
    font-size:11px;
    color:var(--text-muted);
    transition:transform 0.3s;
}
.category-arrow.expanded {
    transform:rotate(90deg);
    color:var(--accent);
}
.category-content {
    display:none;
    padding:8px;
    flex-direction:column;
    gap:6px;
}
.category-content.expanded {
    display:flex;
}

.project-card {
    padding:10px 12px;
    background:rgba(13,19,33,0.5);
    border-radius:10px;
    border:1px solid var(--border);
    cursor:pointer;
    transition:all 0.3s;
}
.project-card:hover {
    border-color:var(--accent);
    box-shadow:0 0 12px rgba(0,212,255,0.08);
}
.project-card.active {
    border-color:var(--accent);
    background:rgba(0,212,255,0.1);
}
.project-name {
    font-size:13px;
    font-weight:600;
    color:var(--text);
    margin-bottom:3px;
}
.project-meta {
    font-size:11px;
    color:var(--text-secondary);
    line-height:1.5;
}
.project-desc {
    font-size:11px;
    color:var(--text-muted);
    line-height:1.5;
    margin-top:4px;
    max-height:3.2em;
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
}
.award-row {
    margin-top:6px;
    display:flex;
    flex-wrap:wrap;
    gap:4px;
}
.award-tag {
    display:inline-block;
    padding:2px 8px;
    border-radius:4px;
    font-size:10px;
}
.award-gold {
    background:rgba(255,215,0,0.15);
    color:#ffd700;
    border:1px solid rgba(255,215,0,0.3);
}
.award-silver {
    background:rgba(192,192,192,0.15);
    color:#c0c0c0;
    border:1px solid rgba(192,192,192,0.3);
}
.award-national {
    background:rgba(0,212,255,0.15);
    color:var(--accent);
    border:1px solid rgba(0,212,255,0.3);
}
.project-tag {
    display:inline-block;
    padding:2px 8px;
    border-radius:4px;
    font-size:10px;
    margin-top:6px;
    margin-right:4px;
}
.tag-cultural {
    background:rgba(235,47,150,0.15);
    color:#eb2f96;
    border:1px solid rgba(235,47,150,0.3);
}
.tag-public {
    background:rgba(0,212,255,0.15);
    color:var(--accent);
    border:1px solid rgba(0,212,255,0.3);
}
.tag-residential {
    background:rgba(82,196,26,0.15);
    color:#52c41a;
    border:1px solid rgba(82,196,26,0.3);
}
.tag-commercial {
    background:rgba(250,140,22,0.15);
    color:#fa8c16;
    border:1px solid rgba(250,140,22,0.3);
}
.tag-medical {
    background:rgba(255,68,68,0.15);
    color:#ff4444;
    border:1px solid rgba(255,68,68,0.3);
}

#map {
    flex:1;
    position:relative;
    z-index:1;
}

.info-window {
    padding:8px;
    min-width:240px;
}
.info-title {
    font-size:14px;
    font-weight:bold;
    color:#333;
    margin-bottom:6px;
    border-bottom:1px solid #eee;
    padding-bottom:4px;
}
.info-row {
    font-size:12px;
    color:#666;
    line-height:1.8;
}
.info-row span {
    color:#999;
}
.info-awards {
    margin-top:6px;
    padding-top:6px;
    border-top:1px solid #eee;
}

/* 奖项页面 */
.awards-page {
    display:grid;
    grid-template-columns:280px 1fr;
    gap:20px;
    height:100%;
}
.awards-sidebar {
    padding:16px;
    background:var(--bg-card);
    border-right:1px solid var(--border);
    overflow-y:auto;
}
.awards-content {
    padding:24px;
    overflow-y:auto;
}
.award-year-group {
    margin-bottom:20px;
}
.award-year-header {
    font-size:18px;
    font-weight:700;
    color:var(--accent);
    margin-bottom:12px;
    padding-bottom:8px;
    border-bottom:1px solid var(--border);
}
.award-card {
    padding:14px 16px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:10px;
    margin-bottom:10px;
    transition:all 0.3s;
}
.award-card:hover {
    border-color:var(--accent);
    box-shadow:0 0 12px rgba(0,212,255,0.08);
}
.award-card-title {
    font-size:14px;
    font-weight:600;
    color:var(--text);
    margin-bottom:6px;
}
.award-card-meta {
    font-size:12px;
    color:var(--text-secondary);
    line-height:1.6;
}
.award-level-badge {
    display:inline-block;
    padding:2px 10px;
    border-radius:4px;
    font-size:11px;
    margin-right:6px;
    font-weight:500;
}
.level-national {
    background:rgba(255,215,0,0.15);
    color:#ffd700;
    border:1px solid rgba(255,215,0,0.3);
}
.level-provincial {
    background:rgba(0,212,255,0.15);
    color:var(--accent);
    border:1px solid rgba(0,212,255,0.3);
}
.level-municipal {
    background:rgba(82,196,26,0.15);
    color:#52c41a;
    border:1px solid rgba(82,196,26,0.3);
}
.level-other {
    background:rgba(138,43,226,0.15);
    color:#a855f7;
    border:1px solid rgba(138,43,226,0.3);
}

/* 标准和出版页面 */
.std-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
    gap:16px;
    padding:8px 0;
}
.std-card {
    padding:16px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:12px;
    transition:all 0.3s;
}
.std-card:hover {
    border-color:var(--accent);
    box-shadow:0 0 12px rgba(0,212,255,0.08);
}
.std-card-type {
    font-size:11px;
    color:var(--accent);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:1px;
}
.std-card-title {
    font-size:14px;
    font-weight:600;
    color:var(--text);
    margin-bottom:8px;
}
.std-card-meta {
    font-size:12px;
    color:var(--text-secondary);
    line-height:1.6;
}
.std-card-code {
    font-family:monospace;
    background:rgba(0,212,255,0.08);
    padding:2px 8px;
    border-radius:4px;
    font-size:11px;
    color:var(--accent);
    margin-top:8px;
    display:inline-block;
}

.book-card {
    display:flex;
    gap:16px;
    padding:16px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:12px;
    transition:all 0.3s;
}
.book-card:hover {
    border-color:var(--accent);
    box-shadow:0 0 12px rgba(0,212,255,0.08);
}
.book-cover {
    width:80px;
    height:110px;
    background:linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.05));
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    flex-shrink:0;
    border:1px solid var(--border);
}
.book-info {
    flex:1;
}
.book-title {
    font-size:15px;
    font-weight:600;
    color:var(--text);
    margin-bottom:6px;
}
.book-meta {
    font-size:12px;
    color:var(--text-secondary);
    line-height:1.7;
}
.book-desc {
    font-size:12px;
    color:var(--text-muted);
    line-height:1.6;
    margin-top:6px;
}

.page-title {
    font-size:22px;
    font-weight:700;
    color:var(--text);
    margin-bottom:20px;
    padding-bottom:12px;
    border-bottom:1px solid var(--border);
}

.sub-filter {
    display:flex;
    gap:8px;
    margin-bottom:16px;
    flex-wrap:wrap;
}
.sub-filter-btn {
    padding:4px 12px;
    border:1px solid var(--border);
    background:rgba(13,19,33,0.5);
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
    color:var(--text-secondary);
    transition:all 0.3s;
}
.sub-filter-btn:hover, .sub-filter-btn.active {
    background:rgba(0,212,255,0.15);
    color:var(--accent);
    border-color:var(--accent);
}

.summary-cards {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:12px;
    margin-bottom:24px;
}
.summary-card {
    padding:16px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:12px;
    text-align:center;
}
.summary-num {
    font-size:28px;
    font-weight:bold;
    color:var(--accent);
}
.summary-label {
    font-size:12px;
    color:var(--text-secondary);
    margin-top:4px;
}
</style>
    <link rel="stylesheet" href="css/mobile-responsive.css">
</head>
<body>

<!-- 顶部导航 -->
<div class="top-nav">
    <div class="nav-brand">🏛️ 天津规划总院·建筑设计产品中心</div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchPage('map')">📍 项目地图</button>
        <button class="nav-tab" onclick="switchPage('awards')">🏆 获奖荣誉</button>
        <button class="nav-tab" onclick="switchPage('standards')">📋 标准规范</button>
        <button class="nav-tab" onclick="switchPage('books')">📚 学术出版</button>
    </div>
    <a href="index.html" class="back-link">← 返回工具箱</a>
</div>

<!-- 主内容 -->
<div class="main-content">

    <!-- 项目地图页 -->
    <div class="page active" id="page-map">
        <div class="sidebar">
            <div class="header">📍 项目类型</div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-num" id="statAwards">0</div>
                    <div class="stat-label">获奖项目</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="statTypes">0</div>
                    <div class="stat-label">类型种类</div>
                </div>
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all" onclick="filterProjects('all')">全部</button>
                <button class="filter-btn" data-filter="文化建筑" onclick="filterProjects('文化建筑')">文化</button>
                <button class="filter-btn" data-filter="办公建筑" onclick="filterProjects('办公建筑')">办公</button>
                <button class="filter-btn" data-filter="教育建筑" onclick="filterProjects('教育建筑')">教育</button>
                <button class="filter-btn" data-filter="医疗建筑" onclick="filterProjects('医疗建筑')">医疗</button>
                <button class="filter-btn" data-filter="住宅公寓" onclick="filterProjects('住宅公寓')">住宅</button>
                <button class="filter-btn" data-filter="更新改造" onclick="filterProjects('更新改造')">更新</button>
                <button class="filter-btn" data-filter="城市设计" onclick="filterProjects('城市设计')">城设</button>
                <button class="filter-btn" data-filter="室内精装" onclick="filterProjects('室内精装')">精装</button>
                <button class="filter-btn" data-filter="总师团队" onclick="filterProjects('总师团队')">总师</button>
                <button class="filter-btn" data-filter="数智平台" onclick="filterProjects('数智平台')">数智</button>
                <button class="filter-btn" data-filter="酒店建筑" onclick="filterProjects('酒店建筑')">酒店</button>
            </div>
            <div class="project-list" id="projectList"></div>
        </div>
        <div id="map"></div>
    </div>

    <!-- 获奖荣誉页 -->
    <div class="page" id="page-awards">
        <div class="awards-sidebar">
            <div class="header">🏆 获奖统计</div>
            <div class="stats-bar" style="flex-direction:column;gap:8px;">
                <div class="stat-item">
                    <div class="stat-num" id="awardTotal">0</div>
                    <div class="stat-label">获奖总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="awardNational">0</div>
                    <div class="stat-label">国家级</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="awardProvincial">0</div>
                    <div class="stat-label">省部级</div>
                </div>
            </div>
            <div class="sub-filter" style="flex-direction:column;gap:6px;margin-top:12px;">
                <button class="sub-filter-btn active" onclick="filterAwards('all')">全部奖项</button>
                <button class="sub-filter-btn" onclick="filterAwards('国家级')">国家级</button>
                <button class="sub-filter-btn" onclick="filterAwards('省部级')">省部级</button>
                <button class="sub-filter-btn" onclick="filterAwards('市级')">市级</button>
                <button class="sub-filter-btn" onclick="filterAwards('行业')">行业</button>
            </div>
        </div>
        <div class="awards-content" id="awardsContent"></div>
    </div>

    <!-- 标准规范页 -->
    <div class="page" id="page-standards">
        <div class="content-panel">
            <div class="page-title">📋 标准 / 规范 / 图集</div>
            <div class="summary-cards" id="stdSummary"></div>
            <div class="sub-filter">
                <button class="sub-filter-btn active" onclick="filterStandards('all')">全部</button>
                <button class="sub-filter-btn" onclick="filterStandards('标准')">标准</button>
                <button class="sub-filter-btn" onclick="filterStandards('规范')">规范</button>
                <button class="sub-filter-btn" onclick="filterStandards('图集')">图集</button>
                <button class="sub-filter-btn" onclick="filterStandards('导则')">导则</button>
            </div>
            <div class="std-grid" id="stdGrid"></div>
        </div>
    </div>

    <!-- 学术出版页 -->
    <div class="page" id="page-books">
        <div class="content-panel">
            <div class="page-title">📚 书刊 / 出版物（赵春水 著作·译作）</div>
            <div class="summary-cards" id="bookSummary"></div>
            <div id="bookList"></div>
        </div>
    </div>

</div>

疗中心项目定位于鲁南地区的区域公共卫生中心，是集临床诊疗、科研教学、应急救援于一体的三级甲等传染病专科医院。项目占地14.05公顷，建筑面积15.81万平方米，规划床位900张。项目秉持朴素、亲和、高效、安全的疗愈设计理念。项目设计特色鲜明，一是采用平战结合模式，构建双医院运行体系，日常分区独立诊疗，疫情时期可快速整体转换救治功能，大幅提升应急收治能力。二是严守院感防控标准，落实三区两通道规划，科学管控气压梯度，通过分级分诊与流线分流设计，全方位筑牢防疫安全防线。三是优化院区空间营造，运用庭院式布局搭配生态景观，打造亲和的疗愈环境，依托模块化设计提质增效，兼顾人文医疗体验与低碳高效运维。", "awards": ["济南市优秀工程勘察设计二等奖"], "tagClass": "tag-medical", "lng": 116.415, "lat": 35.44}, {"id": 15, "name": "新八大里五福里", "type": "住宅公寓", "district": "天津", "location": "天津", "year": "2018", "partner": "—", "desc": "项目为天津市新八大里第五里，该片区位于文化中心地区和天钢柳林地区之间，是联系城市主副中心的发展纽带，区域优势明显。本项目定位为城市高端居住社区。总建筑面积为42.81万平方米，住宅产品类型为小高层住宅和高层住宅。项目为窄路密网、开放街区、复核社区的天津实践，以院落为居住模式，营造社区活动归属感和诗意栖居。", "awards": ["中国土木工程詹天佑奖优秀住宅小区金奖", "海河杯天津市优秀勘察设计一等奖"], "tagClass": "tag-residential", "lng": 117.11, "lat": 39.11}, {"id": 16, "name": "雄安新区容西片区A单元安置房及配套设施", "type": "住宅公寓", "district": "河北", "location": "河北", "year": "2022", "partner": "—", "desc": "项目位于容西片区西北角，为保障性住房，总建筑面积约151.28万㎡，是容西片区先行建设的样板区，2021年2月开工、2022年10月全面交付入住。项目以宜居、智慧、生态为核心理念，建设标准对标商品房，融合绿色建造技术与创新设计，打造新时代高品质居住标杆。项目坚持党建与业务深度融合，以居民需求为核心，严把质量、攻克技术难题，先后斩获多项省级工程、设计类荣誉，收获居民高度认可与多方表彰。", "awards": ["中国土木工程詹天佑奖优秀住宅小区金奖", "天津市优秀工程勘察设计一等成果"], "tagClass": "tag-residential", "lng": 115.9, "lat": 39.01}, {"id": 17, "name": "天津交通旅馆", "type": "更新改造", "district": "天津", "location": "天津", "year": "2023", "partner": "—", "desc": "天津市交通旅馆（和平路243号）项目的设计初衷是将城市更新与盘活存量相结合，赋予文物保护建筑新的使用功能，重振天津最具历史意义的商业街区，使其恢复百年前的辉煌。将传统与科技完美融合，打造出一个既具有现代感又不失地域特色的空间，同时强调内部空间与城市空间的联系。", "awards": ["缪斯设计奖-建筑再生类别-铂金奖", "年度建筑师奖-Winner大奖", "WDA世界设计奖-Winner大奖", "美国建筑大师奖-建筑改造类别-荣誉奖", "法国巴黎DNA设计奖-建筑改造类别-荣誉奖"], "tagClass": "tag-cultural", "lng": 117.095, "lat": 39.1}, {"id": 18, "name": "吉利大厦提升改造", "type": "更新改造", "district": "天津", "location": "天津", "year": "2024", "partner": "—", "desc": "吉利大厦城市更新项目位于天津核心商圈，通过策划·设计·建设·运营一体化模式推动传统商业焕新。项目聚焦业态重构，打造集泛二次元、沉浸式体验、夜生活体验、产业服务于一体的垂直复合体，引入智慧楼宇与数字技术，构建TOD立体慢行系统与双首层空间，有效激活客流并提升商业价值。改造后租金提升180%，日均客流增长300%，成为青年潮流社交新地标，展现了城市更新中业态融合、空间重塑与运营前置的协同优势。", "awards": ["天津市优秀工程勘察设计（城市更新）一等成果"], "tagClass": "tag-cultural", "lng": 117.095, "lat": 39.1}, {"id": 19, "name": "滨海工人文化宫", "type": "更新改造", "district": "天津", "location": "天津", "year": "2025", "partner": "—", "desc": "滨海新区工人文化宫位于滨海新区核心区，交通便捷，总建筑面积约1.7万平方米，由原残疾人综合服务中心改造而来。项目以绿色低碳、高标准建设、突出两性两化、服务产业工人为目标，实施功能重构与性能提升两大策略。功能上，打造集活动、培训、疗休养、住宿于一体的综合空间，优化大厅、智能展厅、文体综合馆、培训宿舍、餐厅及六大主题活动区，完善无障碍设施与室外交通、景观。性能方面，利用空气源热泵系统，搭配数智能源平台实现节能降耗；升级变电站、消防、给排水、照明，实现智能运维降本增效，致力打造低碳节能、服务职工的示范标杆。", "awards": ["海尔智慧楼宇天津市绿色设计大赛优秀成果"], "tagClass": "tag-cultural", "lng": 117.11, "lat": 39.11}, {"id": 20, "name": "华为旗舰店·天津滨江道", "type": "室内精装", "district": "天津", "location": "天津", "year": "2023", "partner": "—", "desc": "（宣传册原文未提供项目描述文字，仅列项目名与奖项）", "awards": ["法国巴黎DNA设计奖-室内零售类别-大奖", "伦敦设计奖-室内类别-金奖", "意大利A'设计大奖-室内类别-银奖", "IDA美国国际设计大奖-室内类别-荣誉奖", "缪斯设计奖-建筑类别-铂金奖", "美国建筑大师奖-荣誉奖", "法国巴黎DNA设计奖-建筑类别-荣誉提名奖", "年度建筑师奖-WINNER大奖", "WDA世界设计奖-WINNER大奖"], "tagClass": "tag-commercial", "lng": 117.14, "lat": 39.13}, {"id": 21, "name": "华为旗舰店·北京王府井", "type": "室内精装", "district": "北京", "location": "北京", "year": "2024", "partner": "—", "desc": "（宣传册原文未提供项目描述文字，仅列项目名与奖项）", "awards": [], "tagClass": "tag-commercial", "lng": 116.445, "lat": 39.88}, {"id": 22, "name": "华为终端展厅", "type": "室内精装", "district": "—", "location": "—", "year": "2025", "partner": "—", "desc": "（宣传册原文未提供项目描述文字，仅列项目名与奖项）", "awards": [], "tagClass": "tag-commercial", "lng": 117.155, "lat": 39.12}, {"id": 23, "name": "文化中心1.0 - 天津文化中心", "type": "城市设计", "district": "天津", "location": "天津", "year": "2012", "partner": "—", "desc": "天津文化中心是天津市委、市政府为适应经济社会快速发展，体现城市发展定位，按照城市总体规划，整合现有文化资源，完善城市文化功能而规划建设的工程，项目于2009年9月开工，2012年3月竣工，同年5月向社会开放。天津文化中心位于天津中心城区南部，毗邻天津行政中心，迎宾馆和大礼堂。本项目占地约90公顷，新建面积92万平方米，地上47万平方米，地下45万平方米，保留建筑8万平方米，合计总建筑面积100万平方米。规划将其于行政中心、接待中心、小白楼商业商务中心共同构建为中心城区的城市主中心，承担综合职能，完善城市文化服务功能，全面提升城市形象，成为一个功能多元、舒适开放的文化活动中心。在最重要的位置建设公共文化设施建筑群，突出了文化性和人民性，使其成为一个为广大群众服务的、生机勃勃的城市中心。", "awards": ["中国土木工程詹天佑大奖", "全国优秀工程勘察设计奖建筑工程一等奖", "全国优秀城乡规划设计一等奖", "海河杯天津市优秀勘察设计特别奖"], "tagClass": "tag-public", "lng": 117.11, "lat": 39.13}, {"id": 24, "name": "文化中心2.0 - 滨海文化中心", "type": "城市设计", "district": "天津", "location": "天津", "year": "2017", "partner": "—", "desc": "滨海文化中心项目选址于滨海新区中心商务区天碱解放路地区，项目规划总用地面积约为92公顷，其中文化建筑区占地约22.5公顷，公园占地约69.5公顷；城市设计形成两区、两廊、两心、三园、三节点的空间结构，长廊串接文化建筑形成文化综合体的布局形式，由南至北形成演艺中心组团、博美图组团和文博组团。滨海文化中心文化场馆总用地面积约为12公顷，总建筑面积约为31万平方米，其中地上建筑面积约为19万平方米，地下建筑面积约为12万平方米。天津市滨海新区文化中心文化场馆部分主要包括滨海科技馆、滨海现代美术馆、滨海图书馆、滨海东方演艺中心、滨海市民活动中心、滨海文化长廊、地下停车场等。滨海文化中心项目2015年3月一期开工，施工期约为22个月，2016年12月竣工，2017年上半年开馆并试运营。滨海新区文化中心是滨海新区核心区开发建设的重点工程，对改善城市形象、提升服务群众水平、形成城市核心竞争力具有重要意义。", "awards": ["全国优秀城乡规划设计奖表扬奖", "天津市优秀城乡规划设计奖二等奖"], "tagClass": "tag-public", "lng": 117.095, "lat": 39.14}, {"id": 25, "name": "文化中心3.0 - 济宁文化中心", "type": "城市设计", "district": "山东", "location": "山东", "year": "2019", "partner": "RASS事务所（德国）", "desc": "济宁文化中心位于济宁市太白湖东岸。设计立足城市的深厚文化特色与基址的环境特征，营造多元开放、活力生态的城市山水客厅。整体基于西文东商的功能格局，用地西侧面向太白湖，从北至南，由动而静依次布置群众艺术馆、图书馆、博物馆、美术馆；在用地东侧，布置业态多样的商业商务建筑。在文化与商业建筑之间，通过一系列逐渐抬高到2层的公园与广场--文化高地公园，强化了与太白湖的视线联系，形成了看得见山，望得见水的城市开放空间。项目占地53.5公顷，总建筑面积48万平方米，于2015年开工建设，2019年一期试运行。", "awards": ["中国土木工程詹天佑大奖", "中国钢结构金奖工程一等奖", "天津市优秀城乡规划设计奖（城市设计）三等奖", "工程建设科学技术奖-科学技术进步奖二等奖", "山东土木建筑科学技术奖（科技进步奖）一等奖"], "tagClass": "tag-public", "lng": 116.415, "lat": 35.46}, {"id": 26, "name": "天津市泰安道地区城市设计", "type": "城市设计", "district": "天津", "location": "天津", "year": "2012", "partner": "天津华汇、博风建筑、大地天方", "desc": "泰安道地区经历了百余年历史的积淀，兼负城市中心区与历史街区的双重属性。规划完整的保留了现状街巷体系，通过降低过境机动车流量，达到改善步行环境的目的。以西方传统的院落形式展开空间布局，形成五大特色院落。借鉴欧洲典型街区尺度及现状历史建筑布局和高度，坚持修旧如旧的原则，对新建筑的高度、风格及细部处理进行详细的控制，保证街区建筑风格的协调统一。公共区域的景观保持解放北园风貌，并按照历史资料对其进行修缮复原，同时根据不同院落的功能定位提出有针对性的景观设计主题，营造适宜的街道与环境氛围。整体更新改造传承了历史文脉，再现了历史传奇。", "awards": ["新中国成立七十周年系列优秀勘察设计项目"], "tagClass": "tag-public", "lng": 117.11, "lat": 39.12}, {"id": 27, "name": "天津市新八大里地区城市设计", "type": "城市设计", "district": "天津", "location": "天津", "year": "2013", "partner": "—", "desc": "天津新八大里街区位于天津市河西区中北部，西侧紧邻天津市主中心文化中心，东侧紧邻天津市副中心天钢柳林地区，是连接城市主次中心的重要区域。横贯项目中部的黑牛城道是中心城区东部入市通道，也是快速环线的重要组成部分。新八大里地区总用地面积214公顷，新建建筑面积总计373万平方米，其中地上新建建筑面积260万平方米(包括公共建筑102万平方米，居住建筑158万平方米);地下新建建筑面积113万平方米。此外，保留建筑面积33万平方米。", "awards": ["全国优秀城乡规划设计二等奖", "天津市优秀城乡规划设计一等奖"], "tagClass": "tag-public", "lng": 117.14, "lat": 39.11}, {"id": 28, "name": "义乌市异国风情街提升改造工程", "type": "城市设计", "district": "义乌", "location": "义乌", "year": "2016", "partner": "天津华汇、博风建筑、大地天方、中天建都市", "desc": "为打造义乌城市的新蓝图，2016年初，市委市政府决定对全市的社区进行整治、改造、提升，在全面摸清全市39个社区现状和问题的基础上，对每个社区进行提升改造规划，着力整治社区内环境差、基础设施落后、公共设施缺乏、业态混乱等问题。整个异国风情街通过功能的划分和空间的重构，在空间上划分为一心、三坊、十二院,其中一心是指邻里中心、游客中心和社区中心公园，三坊是指三个生活智造坊，十二院是指十二个主题休闲院落。总用地面积：26.33公顷；建筑立面改造：288520平方米；屋顶改造面积：51000平方米；道路改造面积：100907平方米；景观绿化改造：32170平方米；新建景观公园：7275平方米；拆除地面建筑面积：7000平方米；新建地上建筑面积：26500平方米；新建地下建筑面积：43000平方米。在理清现状基础上，对于内部十二院、三坊范围主要采取基础治理、综合治理、有机更新三种方式，对全市社区进行改造提升，其中基础治理包括基础设施改造、雨污分流、绿化环境提升等措施，综合治理包括建筑立面改造、道路基础设施改造、增加公共设施和配套设施措施，有机更新主要是城区内的老旧社区，将采取征收房产、拆除重建等方式，全面打造居住品质良好、商业繁荣，具备义乌特色的商业街区和著名景点。", "awards": ["全国优秀城乡规划设计奖（城市设计）三等奖", "天津市优秀城乡规划设计奖（城市设计）一等奖", "海河杯天津市优秀勘察设计（城市更新）一等奖"], "tagClass": "tag-public", "lng": 120.115, "lat": 29.3}, {"id": 29, "name": "天津第一热电厂城市设计", "type": "城市设计", "district": "天津", "location": "天津", "year": "2022", "partner": "—", "desc": "天津第一热电厂城市更新项目位于河东区海河历史文化保护街区，占地约29.4公顷，保留始建于1937年的主厂房，保护海河岸线典型工业遗存。规划以一园、两组、三院落为骨架，打造开放城市花园承载工业记忆，布局暖黄色古典风格高端河景住宅形成错落天际线，构建坡屋顶商业院落与超高层塔楼，实现新旧建筑对话。项目采用窄路密网优化土地利用，结合地铁4号线设六纬路站成为地铁上盖，既保护海河风貌与历史文脉，又通过商住混合业态完善功能，平衡了保护与开发、理想与现实的需求。", "awards": ["中国土木工程詹天佑奖优秀住宅小区金奖（月辉雅苑）"], "tagClass": "tag-public", "lng": 117.095, "lat": 39.12}, {"id": 30, "name": "雄安新区·容西片区", "type": "总师团队", "district": "河北", "location": "河北", "year": "2017-2021", "partner": "—", "desc": "建设雄安新区是党中央的重大历史性战略决策，是干年大计，国家大事。自天津规划院受邀参加雄安新区规划工作营起，以自己的实际行动践行习近平总书记提出的世界眼光、国际标准、中国特色、高点定位的建设要求。2020年4月20日，我院在容西片区控制性详细规划工作在中国雄安官网正式公开亮相，创造着雄安速度和雄安质量的佳话。容西总师团队的工作，是为保障高质量高标准建设雄安，一张蓝图干到底，在雄安一会三函的机制下，以规划编制团队原班人马，搭建技术平台作为片区建设实施的支撑，提供全流程、多专业技术咨询服务。逐层级地保障控规的可实施性，保障实施方案合规、合理，保障交接界面的衔接接口，保障城市精细化设计。具有属地服务、深耕服务的特征，深度参与具体项目设计，并将该服务向前延伸至项目的申请立项，向后延伸到实施和效果跟踪，这是是对传统规划设计、建设实施以及运营管理模式的突破与创新，也是未来城市规划建设发展变革的趋势。容西A单元住宅及配套项目，总建筑规模151万平方米，地上100万平方米，地下51万平方米。其中住宅部分100多万平方米，包括6个户型、20余种楼型，30余处造型不同的底商。同时包括教育、公服、商业等不同类型的12个公共建筑方案设计。我院同总院的5个部门，及国内7家设计院长期保持高频次协调沟通。为打造真正的雄安质量，我们在扩初开展之前，就横跨市政、交通、景观多个专业部门，将关乎生活品质的垃圾、交通、5G、高品质用水、绿建、海绵、人防等16个技术专项，进行了前置性深化设计，落实到实施层面。", "awards": [], "tagClass": "tag-public", "lng": 115.87, "lat": 39.03}, {"id": 31, "name": "天津迎上合城市环境提升", "type": "总师团队", "district": "天津", "location": "天津", "year": "2024-2025", "partner": "—", "desc": "天津自1404年设卫建城，历经百年发展形成中西合璧、古今交融的独特城市肌理。为服务上合组织国际盛会，践行城市更新国家战略，我院以世界眼光、国际标准、中国风尚、天津特色为核心准则，启动天津城市风貌更新行动。项目立足京津冀城市群核心定位，聚焦城市风貌与管理水平提升，以杭山面海、滨河连湖为空间格局，塑造河海互映、城乡一体、古今交融、中西合璧的城市特色，力争1年内再现天津高光风采，打造国际级迎宾城市样板，彰显大气、文雅、精致、有品位的津城气质。本次天津城市风貌更新行动，以赵春水总建筑师为核心领衔，全面推行总师负责制，构建起覆盖全流程、统筹全要素的专业技术保障体系。团队集结规划、建筑、园林、市政等7大领域专业人才，形成跨专业协同矩阵，打破单一领域设计壁垒，实现风貌、功能、文化的一体化统筹。总师负责制以五全核心特征为抓手，同步配套7项实施导则，建立多部门联审、施工图审查、全程督导机制，以标准化、精细化的技术准则，确保每一处整治、每一处焕新都贴合世界眼光、国际标准、中国风尚、天津特色的核心要求，为项目高质量落地筑牢专业根基。", "awards": [], "tagClass": "tag-public", "lng": 117.08, "lat": 39.1}, {"id": 32, "name": "建筑数字能源管理平台", "type": "数智平台", "district": "—", "location": "—", "year": "—", "partner": "—", "desc": "建筑设计院智慧团队专注于智慧建筑、智慧能源等领域，运用物联网、大数据、AI等前沿技术，为客户提供规划、设计、施工、运维全生命周期解决方案。", "awards": [], "tagClass": "tag-public", "lng": 117.2, "lat": 39.12}, {"id": 33, "name": "天津市人民医院数字后勤运维平台", "type": "数智平台", "district": "天津", "location": "天津", "year": "—", "partner": "—", "desc": "天津市人民医院数字后勤运维平台，包含驾驶舱、设备管理、安全管理、维保管理、能源管理、医疗管理六大模块，500多个功能场景。平台基于BIM三维应用、物联网、大数据技术，通过运维策略顶层设计实现医院后勤多个子系统的集成联动，建立运行数据分析算法实现数据价值挖掘，使数据赋能管理，实现医院后勤运维管理的科学化与精细化。", "awards": [], "tagClass": "tag-public", "lng": 117.095, "lat": 39.1}, {"id": 34, "name": "芦台镇第一中学", "type": "教育建筑", "district": "天津", "location": "天津", "year": "2017", "partner": "—", "desc": "", "awards": [], "tagClass": "tag-public", "lng": 117.125, "lat": 39.11}, {"id": 35, "name": "广播电视大学新校区", "type": "教育建筑", "district": "天津", "location": "天津", "year": "2016", "partner": "—", "desc": "", "awards": ["海河杯天津市优秀勘察设计二等奖"], "tagClass": "tag-public", "lng": 117.17, // ====== 页面切换 ======
function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    event.target.classList.add('active');
    
    if (page === 'map' && !map) {
        initMap();
    }
}

// ====== 项目地图 ======
let map;
let markers = [];
let currentFilter = 'all';

function initMap() {
    map = new AMap.Map('map', {
        zoom: 11,
        center: [117.20, 39.13],
        mapStyle: 'amap://styles/dark'
    });
    renderProjects();
    updateStats();
}

function renderProjects() {
    const listEl = document.getElementById('projectList');
    listEl.innerHTML = '';

    const filtered = currentFilter === 'all'
        ? projects
        : projects.filter(p => p.type === currentFilter);

    const grouped = {};
    filtered.forEach(proj => {
        if (!grouped[proj.type]) grouped[proj.type] = [];
        grouped[proj.type].push(proj);
    });

    const typeOrder = ['文化建筑','酒店建筑','办公建筑','教育建筑','医疗建筑','住宅公寓','更新改造','室内精装','城市设计','总师团队','数智平台'];
    const sortedTypes = typeOrder.filter(t => grouped[t]);

    sortedTypes.forEach((type, idx) => {
        const projList = grouped[type];
        const group = document.createElement('div');
        group.className = 'category-group';

        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
            <div class="category-title">
                ${type}
                <span class="category-count">（${projList.length}个）</span>
            </div>
            <span class="category-arrow ${idx === 0 ? 'expanded' : ''}">▶</span>
        `;

        const content = document.createElement('div');
        content.className = 'category-content' + (idx === 0 ? ' expanded' : '');
        if (idx === 0) header.classList.add('active');

        projList.forEach(proj => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.dataset.id = proj.id;

            let awardsHtml = '';
            if (proj.awards && proj.awards.length > 0) {
                const awardClass = proj.awards[0].includes('一等') || proj.awards[0].includes('最佳')
                    ? 'award-gold' : 'award-national';
                awardsHtml = `<div class="award-row">${proj.awards.slice(0,2).map(a => `<span class="award-tag ${awardClass}">${a}</span>`).join('')}</div>`;
            }

            const partnerInfo = proj.partner && proj.partner !== '—' ? ` · ${proj.partner}` : '';
            const yearInfo = proj.year ? ` · ${proj.year}` : '';

            card.innerHTML = `
                <div class="project-name">${proj.name}</div>
                <div class="project-meta">📍 ${proj.district}${yearInfo}${partnerInfo}</div>
                <div class="project-desc">${proj.desc.substring(0,80)}${proj.desc.length > 80 ? '...' : ''}</div>
                <span class="project-tag ${proj.tagClass}">${proj.type}</span>
                ${awardsHtml}
            `;
            card.onclick = () => focusProject(proj);
            content.appendChild(card);
        });

        header.onclick = () => {
            const isExpanded = content.classList.contains('expanded');
            content.classList.toggle('expanded');
            header.querySelector('.category-arrow').classList.toggle('expanded', !isExpanded);
            header.classList.toggle('active', !isExpanded);
        };

        group.appendChild(header);
        group.appendChild(content);
        listEl.appendChild(group);
    });

    if (map) renderMarkers(filtered);
}

function renderMarkers(projectList) {
    markers.forEach(m => map.remove(m));
    markers = [];

    projectList.forEach(proj => {
        const marker = new AMap.Marker({
            position: [proj.lng, proj.lat],
            title: proj.name,
            label: {
                content: proj.name,
                direction: 'top',
                offset: new AMap.Pixel(0, -5)
            }
        });

        let awardsHtml = '';
        if (proj.awards && proj.awards.length > 0) {
            awardsHtml = `<div class="info-awards"><strong>获奖：</strong>${proj.awards.join('<br>')}</div>`;
        }

        const partnerInfo = proj.partner && proj.partner !== '—' ? `<div class="info-row"><span>合作：</span>${proj.partner}</div>` : '';

        const infoContent = `
            <div class="info-window">
                <div class="info-title">${proj.name}</div>
                <div class="info-row"><span>类型：</span>${proj.type}</div>
                <div class="info-row"><span>区域：</span>${proj.district}</div>
                ${partnerInfo}
                <div class="info-row"><span>年份：</span>${proj.year}</div>
                <div class="info-row"><span>描述：</span>${proj.desc.substring(0,120)}${proj.desc.length > 120 ? '...' : ''}</div>
                ${awardsHtml}
            </div>
        `;

        const infoWindow = new AMap.InfoWindow({
            content: infoContent,
            offset: new AMap.Pixel(0, -30)
        });

        marker.on('click', () => {
            infoWindow.open(map, marker.getPosition());
            highlightCard(proj.id);
        });

        marker.setMap(map);
        markers.push(marker);
    });
}

function focusProject(proj) {
    map.setZoomAndCenter(14, [proj.lng, proj.lat]);
    highlightCard(proj.id);
    const marker = markers.find(m => {
        const pos = m.getPosition();
        return Math.abs(pos.lng - proj.lng) < 0.0001 && Math.abs(pos.lat - proj.lat) < 0.0001;
    });
    if (marker) marker.emit('click');
}

function highlightCard(id) {
    document.querySelectorAll('.project-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`.project-card[data-id="${id}"]`);
    if (card) {
        card.classList.add('active');
        const content = card.closest('.category-content');
        if (content && !content.classList.contains('expanded')) {
            content.classList.add('expanded');
            const header = content.previousElementSibling;
            if (header) {
                header.classList.add('active');
                const arrow = header.querySelector('.category-arrow');
                if (arrow) arrow.classList.add('expanded');
            }
        }
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function filterProjects(type) {
    currentFilter = type;
    document.querySelectorAll('#page-map .filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === type);
    });
    renderProjects();
}

function updateStats() {
    document.getElementById('statTotal').textContent = projects.length;
    const awardCount = projects.filter(p => p.awards && p.awards.length > 0).length;
    document.getElementById('statAwards').textContent = awardCount;
    const types = new Set(projects.map(p => p.type));
    document.getElementById('statTypes').textContent = types.size;
}

// ====== 获奖荣誉 ======
let awardFilter = 'all';

function renderAwards() {
    const container = document.getElementById('awardsContent');
    container.innerHTML = '';

    const filtered = awardFilter === 'all'
        ? awards
        : awards.filter(a => a.level.includes(awardFilter));

    // 统计
    document.getElementById('awardTotal').textContent = filtered.length;
    document.getElementById('awardNational').textContent = filtered.filter(a => a.level.includes('国家')).length;
    document.getElementById('awardProvincial').textContent = filtered.filter(a => a.level.includes('省') || a.level.includes('部')).length;

    // 按年份分组（降序）
    const byYear = {};
    filtered.forEach(a => {
        const y = a.year || '未标注';
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(a);
    });

    const sortedYears = Object.keys(byYear).sort((a, b) => {
        if (a === '未标注') return 1;
        if (b === '未标注') return -1;
        return b.localeCompare(a);
    });

    sortedYears.forEach(year => {
        const group = document.createElement('div');
        group.className = 'award-year-group';

        const header = document.createElement('div');
        header.className = 'award-year-header';
        header.textContent = `${year}年（${byYear[year].length}项）`;
        group.appendChild(header);

        byYear[year].forEach(a => {
            const card = document.createElement('div');
            card.className = 'award-card';

            let levelClass = 'level-other';
            if (a.level.includes('国家')) levelClass = 'level-national';
            else if (a.level.includes('省') || a.level.includes('部')) levelClass = 'level-provincial';
            else if (a.level.includes('市')) levelClass = 'level-municipal';

            card.innerHTML = `
                <div class="award-card-title">${a.name}</div>
                <div class="award-card-meta">
                    <span class="award-level-badge ${levelClass}">${a.level}</span>
                    <span>${a.category}</span>
                    ${a.project ? '· ' + a.project : ''}
                </div>
            `;
            group.appendChild(card);
        });

        container.appendChild(group);
    });
}

function filterAwards(level) {
    awardFilter = level;
    document.querySelectorAll('#page-awards .sub-filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(level) || (level === 'all' && btn.textContent.includes('全部')));
    });
    renderAwards();
}

// ====== 标准规范 ======
let stdFilter = 'all';

function renderStandards() {
    const container = document.getElementById('stdGrid');
    container.innerHTML = '';

    const filtered = stdFilter === 'all'
        ? standards
        : standards.filter(s => s.type.includes(stdFilter));

    // 摘要
    const summaryEl = document.getElementById('stdSummary');
    const typeCounts = {};
    standards.forEach(s => {
        const t = s.type;
        typeCounts[t] = (typeCounts[t] || 0) + 1;
    });
    summaryEl.innerHTML = `
        <div class="summary-card"><div class="summary-num">${standards.length}</div><div class="summary-label">标准规范总数</div></div>
        ${Object.entries(typeCounts).map(([t,c]) => `<div class="summary-card"><div class="summary-num">${c}</div><div class="summary-label">${t}</div></div>`).join('')}
    `;

    filtered.forEach(s => {
        const card = document.createElement('div');
        card.className = 'std-card';
        card.innerHTML = `
            <div class="std-card-type">${s.type}</div>
            <div class="std-card-title">${s.name}</div>
            <div class="std-card-meta">${s.role}</div>
            ${s.code ? `<span class="std-card-code">${s.code}</span>` : ''}
        `;
        container.appendChild(card);
    });
}

function filterStandards(type) {
    stdFilter = type;
    document.querySelectorAll('#page-standards .sub-filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(type) || (type === 'all' && btn.textContent.includes('全部')));
    });
    renderStandards();
}

// ====== 学术出版 ======
function renderBooks() {
    const container = document.getElementById('bookList');
    container.innerHTML = '';

    const summaryEl = document.getElementById('bookSummary');
    const typeCounts = {};
    books.forEach(b => {
        const t = b.type;
        typeCounts[t] = (typeCounts[t] || 0) + 1;
    });
    summaryEl.innerHTML = `
        <div class="summary-card"><div class="summary-num">${books.length}</div><div class="summary-label">出版物总数</div></div>
        ${Object.entries(typeCounts).map(([t,c]) => `<div class="summary-card"><div class="summary-num">${c}</div><div class="summary-label">${t}</div></div>`).join('')}
    `;

    books.forEach(b => {
        const card = document.createElement('div');
        card.className = 'book-card';
        const icon = b.type === '译著' ? '📖' : b.type === '专著' ? '📕' : b.type === '编著' ? '📗' : '📘';
        card.innerHTML = `
            <div class="book-cover">${icon}</div>
            <div class="book-info">
                <div class="book-title">${b.title}</div>
                <div class="book-meta">
                    <span style="color:var(--accent)">${b.type}</span> · ${b.author}<br>
                    ${b.publisher} ${b.year ? '· ' + b.year + '年' : ''}
                    ${b.isbn ? '<br>ISBN: ' + b.isbn : ''}
                </div>
                ${b.desc ? `<div class="book-desc">${b.desc.substring(0,120)}${b.desc.length > 120 ? '...' : ''}</div>` : ''}
            </div>
        `;
        container.appendChild(card);
    });
}

// ====== 初始化 ======
window.onload = () => {
    initMap();
    renderAwards();
    renderStandards();
    renderBooks();
};
</script>
